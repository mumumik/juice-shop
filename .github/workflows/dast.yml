name: Veracode DAST

on:
  push:
    branches: master
  workflow_dispatch:

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Veracode CLI
        run: |
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh

      - name: Run Veracode DAST
        env:
          VERACODE_API_KEY_ID: ${{ secrets.VERACODE_API_KEY_ID }}
          VERACODE_API_KEY_SECRET: ${{ secrets.VERACODE_API_KEY_SECRET }}
          VERACODE_TARGET_ID: ${{ secrets.VERACODE_TARGET_ID }}
        run: |
          veracode dynamic scan \
            --webhook "$VERACODE_TARGET_ID"